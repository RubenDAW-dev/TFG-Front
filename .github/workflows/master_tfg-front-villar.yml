name: Build and deploy Angular app to Azure Web App - tfg-front-villar

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build Angular
        run: npm run build --if-present

      # Subimos SOLO la carpeta final del build Angular
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: dist/TFG/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CBA3AB6B84614706B5362CB60C7EB829 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E992B9752EE244BD976683E9B27569DB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_80411C8DD86D4206B11A5730F4EB4A55 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tfg-front-villar'
          slot-name: 'Production'
          package: .