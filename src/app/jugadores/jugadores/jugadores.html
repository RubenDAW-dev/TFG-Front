<div class="grid">
  <div class="col-12">
    <div class="card shadow-2 border-round p-4 surface-card">

      <div class="flex justify-content-between align-items-center mb-4">
        <h1 class="m-0 text-900 font-bold">Estadísticas de Jugadores</h1>
      </div>

      <p-table #dt [value]="players" [paginator]="true" [rows]="20" [totalRecords]="totalRecords" [lazy]="true"
        (onLazyLoad)="onLazyLoad($event)" [rowsPerPageOptions]="[10,20,50]"
        [globalFilterFields]="['playerName','teamName']" sortMode="multiple" dataKey="playerId"
        styleClass="p-datatable-striped">

        <!-- HEADER -->
        <ng-template pTemplate="caption">
          <div class="flex flex-column md:flex-row justify-content-between gap-3">

            <div class="flex gap-2 w-full md:w-auto">
              <p-iconField style="width: 250px;">
                <p-inputIcon class="pi pi-search"></p-inputIcon>
                <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                  placeholder="Buscar jugador..." />
              </p-iconField>
            </div>

            <p-button label="Filtros" icon="pi pi-filter" severity="secondary" outlined="true"
              (click)="filterMenu.toggle($event)"></p-button>

          </div>
        </ng-template>

        <!-- POPOVER DE FILTROS -->
        <p-popover #filterMenu [style]="{ width: '350px' }">
          <div class="flex flex-column gap-3 p-3">

            <h3 class="m-0">Filtrar</h3>

            <div class="field">
              <label class="font-semibold block mb-2">Equipo</label>
              <p-select [options]="teams" [(ngModel)]="selectedTeam" placeholder="Todos" optionLabel="nombre"
                optionValue="id" appendTo="body" styleClass="w-full"></p-select>
            </div>

            <div class="flex justify-content-end gap-2 mt-3">
              <p-button label="Limpiar" severity="secondary" text="true"
                (click)="clearFilters(); filterMenu.hide()"></p-button>
              <p-button label="Aplicar" icon="pi pi-check" (click)="applyFilters(); filterMenu.hide()"></p-button>
            </div>

          </div>
        </p-popover>

        <!-- CABECERA TABLA -->
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="playerName">Jugador <p-sortIcon field="playerName"></p-sortIcon></th>
            <th pSortableColumn="teamName">Equipo <p-sortIcon field="teamName"></p-sortIcon></th>
            <th pSortableColumn="goles">Goles <p-sortIcon field="goles"></p-sortIcon></th>
            <th pSortableColumn="asistencias">Asistencias <p-sortIcon field="asistencias"></p-sortIcon></th>
            <th pSortableColumn="minutos">Minutos <p-sortIcon field="minutos"></p-sortIcon></th>
            <th pSortableColumn="partidos">Partidos <p-sortIcon field="partidos"></p-sortIcon></th>
          </tr>
        </ng-template>

        <!-- CUERPO TABLA -->
        <ng-template pTemplate="body" let-p>
          <tr>
            <td>{{ p.playerName }}</td>
            <td>{{ p.teamName }}</td>
            <td><b>{{ p.goles }}</b></td>
            <td><b>{{ p.asistencias }}</b></td>
            <td>{{ p.minutos }}</td>
            <td>{{ p.partidos }}</td>
          </tr>
        </ng-template>

      </p-table>

    </div>
  </div>
</div>
