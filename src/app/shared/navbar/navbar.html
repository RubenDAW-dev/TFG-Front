<nav class="top-nav">
  <div class="nav-content">

    <!-- IZQUIERDA: Logo + Links -->
    <div class="nav-left">
      <a class="nav-logo" routerLink="/dashboard" aria-label="Inicio">
        <!-- Logo SVG inline (ligero y escalable) -->
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#c084fc"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="28" fill="none" stroke="url(#g1)" stroke-width="3"/>
          <path d="M16 40 L26 24 L36 34 L48 20" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">TFG<span>Stats</span></span>
      </a>

      <ul class="nav-links">
        <li><a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
        <li><a routerLink="/jugadores" routerLinkActive="active">Jugadores</a></li>
        <li><a routerLink="/equipos" routerLinkActive="active">Equipos</a></li>
        <li><a routerLink="/partidos" routerLinkActive="active">Partidos</a></li>
        <li><a routerLink="/comparador" routerLinkActive="active">Comparador</a></li>
      </ul>
    </div>

    <!-- DERECHA: Login -->
    <div class="nav-right">
      <button class="btn-login" (click)="goToLogin()">Login</button>

      <!-- hamburguesa móvil -->
      <button class="btn-burger" (click)="toggleMobile()" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>

  <!-- Menú móvil desplegable -->
  <div class="mobile-menu" [class.open]="mobileOpen">
    <a routerLink="/dashboard" (click)="closeMobile()">Home</a>
    <a routerLink="/jugadores" (click)="closeMobile()">Jugadores</a>
    <a routerLink="/equipos" (click)="closeMobile()">Equipos</a>
    <a routerLink="/partidos" (click)="closeMobile()">Partidos</a>
    <a routerLink="/comparador" (click)="closeMobile()">Comparador</a>
    <button class="btn-login mobile" (click)="goToLogin(); closeMobile()">Login</button>
  </div>
</nav>
