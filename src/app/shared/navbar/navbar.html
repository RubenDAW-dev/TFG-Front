<nav class="top-nav">
  <div class="nav-content">

    <!-- IZQUIERDA: Logo + Links -->
    <div class="nav-left">
      <a class="nav-logo" routerLink="/dashboard" aria-label="Inicio">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#c084fc" />
              <stop offset="100%" stop-color="#a855f7" />
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="28" fill="none" stroke="url(#g1)" stroke-width="3" />
          <path d="M16 40 L26 24 L36 34 L48 20" fill="none" stroke="url(#g1)" stroke-width="4"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="logo-text">TFG<span>Stats</span></span>
      </a>

      <ul class="nav-links">
        <li>
          <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        </li>
        <li>
          <a routerLink="/jugadores" routerLinkActive="active">Jugadores</a>
        </li>
        <li>
          <a routerLink="/equipos" routerLinkActive="active">Equipos</a>
        </li>
        <li>
          <a routerLink="/comparador" routerLinkActive="active">Comparador</a>
        </li>
        <li>
          <a routerLink="/partidos" routerLinkActive="active">Partidos</a>
        </li>
      </ul>
    </div>

    <!-- DERECHA: Login / Usuario -->
    <div class="nav-right">
      <!-- NO autenticado: mostrar Login + Register -->
      <ng-container *ngIf="!auth.isAuthenticated(); else logged">
        <button class="btn-login" (click)="goToLogin()">Login</button>
        <button class="btn-login" (click)="goToRegister()">Register</button>
      </ng-container>

      <!-- SÍ autenticado: nombre + salir -->
      <ng-template #logged>
        <span class="user-name" style="color: #c084fc">Hola, {{ auth.currentUser()?.nombre }}</span>
        <button class="btn-login" (click)="logout()">Salir</button>
      </ng-template>

      <!-- hamburguesa móvil -->
      <button class="btn-burger" (click)="toggleMobile()" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Menú móvil -->
  <div class="mobile-menu" [class.open]="mobileOpen()">
    <a routerLink="/dashboard" (click)="closeMobile()">Home</a>

    <ng-container *ngIf="!auth.isAuthenticated(); else mobileLogged">
      <button class="btn-login mobile" (click)="goToLogin(); closeMobile()">Login</button>
      <button class="btn-login mobile" (click)="goToRegister(); closeMobile()">Register</button>
    </ng-container>

    <ng-template #mobileLogged>
      <div class="mobile-user">
        <span style="color: #c084fc">Hola, {{ auth.currentUser()?.nombre }}</span>
        <button class="btn-login mobile" (click)="logout(); closeMobile()">Salir</button>
      </div>
    </ng-template>
  </div>
</nav>
