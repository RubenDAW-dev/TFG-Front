<div class="login-page">
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="tu@email.com" />
      <div class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">Email requerido</div>

      <label>Contraseña</label>
      <input type="password" formControlName="password" placeholder="••••••••" />
      <div class="error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Contraseña requerida
      </div>
      <div class="register-link">
        ¿Has olvidado tu contraseña?
        <a routerLink="/reset-password">Restablecer contraseña</a>
      </div>
      <button type="submit" [disabled]="form.invalid || loading">{{ loading ? 'Entrando...' : 'Entrar' }}</button>
      <div class="error" *ngIf="error">{{ error }}</div>
    </form>
    <div class="register-link">
      ¿No tienes cuenta?
      <a routerLink="/register">Registrarme</a>
    </div>
  </div>
</div>
