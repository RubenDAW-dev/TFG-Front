<div class="admin-section">

  <div class="section-header">
    <h2 class="section-title">⚽ Gestión de Equipos</h2>
  </div>

  <!-- BÚSQUEDA Y FILTROS -->
  <div class="filter-section">
    <input 
      type="text" 
      pInputText
      [(ngModel)]="busqueda" 
      (ngModelChange)="onBusquedaChange()"
      placeholder="🔍 Buscar por nombre, ciudad o estadio..."
      class="search-input"
    />
    <button 
      pButton type="button"
      icon="pi pi-times"
      *ngIf="busqueda"
      (click)="limpiarFiltros()"
      class="p-button-text"
      label="Limpiar">
    </button>
  </div>

  <!-- TABLA DE EQUIPOS CON PAGINACIÓN -->
  <p-table
  [value]="equiposFiltrados"
  [loading]="cargando"
  responsiveLayout="scroll"
  styleClass="p-datatable-striped">

  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre"></p-sortIcon></th>
      <th pSortableColumn="ciudad">Ciudad <p-sortIcon field="ciudad"></p-sortIcon></th>
      <th>Estadio</th>
      <th>Capacidad</th>
      <th style="width: 10%">Acciones</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-equipo>
    <tr>
      <td><strong>{{ equipo.nombre }}</strong></td>
      <td>{{ equipo.ciudad }}</td>
      <td>{{ equipo.estadio }}</td>
      <td>{{ equipo.capacidad | number }}</td>
      <td>
        <button pButton type="button"
                icon="pi pi-pencil"
                class="p-button-rounded p-button-warning p-button-sm"
                (click)="editarEquipo(equipo)"
                pTooltip="Editar"
                tooltipPosition="top">
        </button>
      </td>
    </tr>
  </ng-template>

  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="5" style="text-align: center;">No hay equipos</td>
    </tr>
  </ng-template>

</p-table>

</div>

<!-- MODAL FORMULARIO -->
<p-dialog 
  [(visible)]="mostrarForm"
  [header]="editandoId ? 'Editar Equipo' : 'Nuevo Equipo'"
  [modal]="true"
  [style]="{width: '50vw', 'z-index': 1000}"
  [breakpoints]="{'960px': '75vw', '640px': '90vw'}"
  [draggable]="false"
  [resizable]="false"
  (onShow)="onDialogShow()"
  (onHide)="onDialogHide()">

  <ng-template pTemplate="content">
    <div class="form-modal">

      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" pInputText [(ngModel)]="formData.nombre" placeholder="Ej: Real Madrid" />
        </div>

        <div class="form-group">
          <label>Ciudad</label>
          <input type="text" pInputText [(ngModel)]="formData.ciudad" placeholder="Ej: Madrid" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Estadio</label>
          <input type="text" pInputText [(ngModel)]="formData.estadio" placeholder="Ej: Santiago Bernabéu" />
        </div>

        <div class="form-group">
          <label>Capacidad</label>
          <input type="number" pInputText [(ngModel)]="formData.capacidad" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>URL Escudo</label>
          <input type="text" pInputText [(ngModel)]="formData.escudo" placeholder="https://..." />
        </div>
      </div>

      <div class="form-error" *ngIf="error">⚠️ {{ error }}</div>

    </div>
  </ng-template>

  <ng-template pTemplate="footer">
    <button pButton type="button" 
            label="Cancelar" 
            (click)="cerrarFormulario()"
            class="p-button-text">
    </button>

    <button pButton type="button" 
            [label]="editandoId ? 'Actualizar' : 'Crear'"
            (click)="guardarEquipo()"
            class="p-button-success">
    </button>
  </ng-template>

</p-dialog>
