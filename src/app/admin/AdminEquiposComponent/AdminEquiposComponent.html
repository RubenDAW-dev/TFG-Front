<div class="admin-section">

  <div class="section-header">
    <h2 class="section-title">⚽ Gestión de Equipos</h2>
  </div>

  <!-- BÚSQUEDA -->
  <div class="filter-section">
    <input
      type="text"
      pInputText
      [(ngModel)]="busqueda"
      (ngModelChange)="onBusquedaChange()"
      placeholder="🔍 Buscar por nombre, ciudad o estadio..."
      class="search-input"
    />

    <select
      class="filter-select"
      [(ngModel)]="selectedCity"
      (ngModelChange)="onCityChange()">
      <option value="">Todas las ciudades</option>
      <option *ngFor="let city of cities" [value]="city">{{ city }}</option>
    </select>

    <button
      pButton
      type="button"
      icon="pi pi-times"
      class="p-button-text"
      label="Limpiar"
      *ngIf="busqueda || selectedCity"
      (click)="limpiarFiltros()">
    </button>
  </div>

  <!-- TABLA -->
  <p-table
    [value]="equiposFiltrados"
    [loading]="cargando"
    responsiveLayout="scroll"
    styleClass="p-datatable-striped">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="nombre">
          Nombre <p-sortIcon field="nombre"></p-sortIcon>
        </th>
        <th pSortableColumn="ciudad">
          Ciudad <p-sortIcon field="ciudad"></p-sortIcon>
        </th>
        <th>Estadio</th>
        <th>Capacidad</th>
        <th style="width: 10%">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-equipo>
      <tr>
        <td>
          <div class="team-cell">
            <img
              *ngIf="getEscudoEquipo(equipo)"
              [src]="getEscudoEquipo(equipo)"
              [alt]="equipo.nombre"
              class="team-shield"
            />
            <strong>{{ equipo.nombre }}</strong>
          </div>
        </td>
        <td>{{ equipo.ciudad }}</td>
        <td>{{ equipo.estadio }}</td>
        <td>{{ equipo.capacidad | number }}</td>
        <td>
          <!-- ✅ MISMO PATRÓN QUE JUGADORES / PARTIDOS -->
          <div class="acciones-cell">
            <button
              pButton
              type="button"
              icon="pi pi-pencil"
              class="p-button-text p-button-warning p-button-sm"
              (click)="editarEquipo(equipo)"
              pTooltip="Editar"
              tooltipPosition="top">
            </button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" style="text-align: center;">
          No hay equipos
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>

<!-- MODAL FORMULARIO -->
<p-dialog
  [(visible)]="mostrarForm"
  [header]="editandoId ? 'Editar Equipo' : 'Nuevo Equipo'"
  [modal]="true"
  [style]="{ width: '50vw', 'z-index': 1000 }"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
  [draggable]="false"
  [resizable]="false"
  (onShow)="onDialogShow()"
  (onHide)="onDialogHide()">

  <ng-template pTemplate="content">
    <div class="form-modal">

      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" pInputText [(ngModel)]="formData.nombre" />
        </div>
        <div class="form-group">
          <label>Ciudad</label>
          <input type="text" pInputText [(ngModel)]="formData.ciudad" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Estadio</label>
          <input type="text" pInputText [(ngModel)]="formData.estadio" />
        </div>
        <div class="form-group">
          <label>Capacidad</label>
          <input type="number" pInputText [(ngModel)]="formData.capacidad" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>URL Escudo</label>
          <input type="text" pInputText [(ngModel)]="formData.escudo" />
        </div>
      </div>

      <div class="form-error" *ngIf="error">⚠️ {{ error }}</div>

    </div>
  </ng-template>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      label="Cancelar"
      class="p-button-text"
      (click)="cerrarFormulario()">
    </button>

    <button
      pButton
      type="button"
      [label]="editandoId ? 'Actualizar' : 'Crear'"
      class="p-button-success"
      (click)="guardarEquipo()">
    </button>
  </ng-template>

</p-dialog>
