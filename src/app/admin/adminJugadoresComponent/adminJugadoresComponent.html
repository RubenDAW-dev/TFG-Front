<div class="admin-section">

  <!-- CABECERA -->
  <div class="section-header">
    <h2 class="section-title">👤 Gestión de Jugadores</h2>

    <button
      pButton
      type="button"
      label="Nuevo jugador"
      icon="pi pi-plus"
      class="p-button-success"
      (click)="toggleForm()">
    </button>
  </div>

  <!-- FILTROS -->
  <div class="filter-section">

    <input
      type="text"
      pInputText
      [(ngModel)]="busqueda"
      (ngModelChange)="onBusquedaChange()"
      placeholder="🔍 Buscar por nombre, posición o nacionalidad..."
      class="search-input"
    />

    <ng-select
      class="filter-ng-select"
      [items]="equipos"
      bindLabel="nombre"
      bindValue="id"
      [(ngModel)]="filtroEquipo"
      (ngModelChange)="onFiltroEquipoChange()"
      placeholder="Todos los equipos"
      [clearable]="true">
    </ng-select>

    <button
      pButton
      type="button"
      label="Limpiar"
      icon="pi pi-times"
      class="p-button-text"
      *ngIf="busqueda || filtroEquipo"
      (click)="limpiarFiltros()">
    </button>

  </div>

  <!-- TABLA -->
  <p-table
    [value]="jugadoresFiltrados"
    [loading]="cargando"
    [paginator]="true"
    [rows]="rows"
    [first]="first"
    [totalRecords]="totalRecords"
    [rowsPerPageOptions]="[20, 50, 100]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} jugadores"
    responsiveLayout="scroll"
    styleClass="p-datatable-striped">

    <ng-template pTemplate="header">
      <tr>
        <th>Jugador</th>
        <th>Posición</th>
        <th>Edad</th>
        <th>Nacionalidad</th>
        <th>Equipo</th>
        <th style="width: 120px">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-jugador>
      <tr>
        <td>
          <div class="player-cell">
            <img
              *ngIf="jugador.imageUrl"
              [src]="jugador.imageUrl"
              class="player-image"
              alt="Jugador" />
            <strong>{{ jugador.nombre }}</strong>
          </div>
        </td>
        <td>{{ jugador.posicion }}</td>
        <td>{{ jugador.edad }}</td>
        <td>{{ jugador.nacionalidad }}</td>
        <td>{{ getNombreEquipo(jugador.team?.id) }}</td>
        <td>
          <div class="acciones-cell">
            <button
              pButton
              type="button"
              icon="pi pi-pencil"
              class="p-button-warning p-button-sm"
              pTooltip="Editar"
              (click)="editarJugador(jugador)">
            </button>

            <button
              pButton
              type="button"
              icon="pi pi-trash"
              class="p-button-danger p-button-sm"
              pTooltip="Eliminar"
              (click)="eliminarJugador(jugador.id, jugador.nombre)">
            </button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" style="text-align:center">
          No hay jugadores
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>

<!-- MODAL FORMULARIO -->
<p-dialog
  [(visible)]="mostrarForm"
  [header]="editandoId ? 'Editar Jugador' : 'Nuevo Jugador'"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '50vw', 'z-index': 1000 }"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
  (onShow)="onDialogShow()"
  (onHide)="onDialogHide()">

  <div class="form-modal">

    <div class="form-row">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" pInputText [(ngModel)]="formData.nombre" />
      </div>

      <div class="form-group">
        <label>Posición</label>
        <input type="text" pInputText [(ngModel)]="formData.posicion" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Edad</label>
        <input type="number" pInputText [(ngModel)]="formData.edad" />
      </div>

      <div class="form-group">
        <label>Nacionalidad</label>
        <input type="text" pInputText [(ngModel)]="formData.nacionalidad" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Equipo</label>
        <ng-select
          [items]="equipos"
          bindLabel="nombre"
          bindValue="id"
          [(ngModel)]="formData.teamId"
          placeholder="Selecciona equipo">
        </ng-select>
      </div>

      <div class="form-group">
        <label>URL Imagen</label>
        <input type="text" pInputText [(ngModel)]="formData.imageUrl" />
      </div>
    </div>

    <div class="form-error" *ngIf="error">
      ⚠️ {{ error }}
    </div>

  </div>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      label="Cancelar"
      class="p-button-text"
      (click)="cerrarFormulario()">
    </button>

    <button
      pButton
      type="button"
      [label]="editandoId ? 'Actualizar' : 'Crear'"
      class="p-button-success"
      (click)="guardarJugador()">
    </button>
  </ng-template>

</p-dialog>
