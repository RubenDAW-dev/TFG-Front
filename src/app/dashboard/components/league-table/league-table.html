<div>
  <h2>Clasificación</h2>

  @if (table && table.length > 0) {
    <p-table [value]="table">
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 8%;">Pos</th>
          <th style="width: 32%;">Equipo</th>
          <th style="width: 15%;">Pts</th>
          <th style="width: 15%;">GF</th>
          <th style="width: 15%;">GC</th>
          <th style="width: 15%;">DG</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-row let-rowIndex="rowIndex">
        <tr
          [routerLink]="['/equipos', row.teamId]"
          style="cursor: pointer"
        >
          <td>{{ rowIndex + 1 }}</td>
          <td>
            <img [src]="row.escudoUrl" [alt]="row.teamName" style="width: 28px; height: 28px; margin-right: 10px;" />
            {{ row.teamName }}
          </td>
          <td>{{ row.puntos }}</td>
          <td>{{ row.golesFavor }}</td>
          <td>{{ row.golesContra }}</td>
          <td>{{ row.diferenciaGoles }}</td>
        </tr>
      </ng-template>
    </p-table>
  } @else {
    <p class="text-gray-500">No hay datos disponibles</p>
  }
</div>
