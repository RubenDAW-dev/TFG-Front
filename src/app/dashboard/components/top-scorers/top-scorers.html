<div>
  <h2>Top Goleadores</h2>
  
  @if (players && players.length > 0) {
    <div class="flex-1">
      @for (p of players; track $index) {
        <div class="flex">
          <div class="w-10">{{ $index + 1 }}</div>
          <div>{{ p.playerName }}</div>
          <div class="text-red-600">{{ p.valor }}</div>
        </div>
      }
    </div>
  } @else {
    <p class="text-gray-500">No hay datos disponibles</p>
  }
</div>
