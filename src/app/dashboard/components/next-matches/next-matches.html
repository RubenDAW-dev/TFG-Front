<h2 class="section-title">Próximos partidos</h2>

<div *ngIf="matches.length === 0" class="empty">
  No hay datos disponibles.
</div>

<div *ngIf="matches.length > 0">
  <div
    class="match-row"
    *ngFor="let match of matches"
    [routerLink]="['/partidos', match.id]"
  >
    <!-- Equipo local -->
    <div class="team home">
      <img
        class="team-shield"
        [src]="match.homeTeamEscudo"
        [alt]="match.homeTeam"
      />
      <span class="team-name">
        {{ match.homeTeam }}
      </span>
    </div>

    <!-- Fecha / Hora -->
    <div class="match-center">
      <span class="day">
        {{ formatDay(match.day) }}
      </span>
      <span class="time">
        {{ match.time }}
      </span>
    </div>

    <!-- Equipo visitante -->
    <div class="team away">
      <span class="team-name">
        {{ match.awayTeam }}
      </span>
      <img
        class="team-shield"
        [src]="match.awayTeamEscudo"
        [alt]="match.awayTeam"
      />
    </div>
  </div>
</div>
